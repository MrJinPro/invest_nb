<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080b11"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="nova" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <rect width="504" height="504" x="4" y="4" rx="124" fill="none" stroke="url(#nova)" stroke-width="4" stroke-opacity="0.3"/>

  <!-- Glowing Emblem Nova "N" with Boost Rocket/Lightning -->
  <g filter="url(#glow)">
    <!-- Left Stem -->
    <path d="M 140 380 L 140 130 L 190 130 L 190 380 Z" fill="url(#nova)" />
    <!-- Diagonal Thrust -->
    <path d="M 190 130 L 320 380 L 370 380 L 240 130 Z" fill="url(#spark)" />
    <!-- Right Stem -->
    <path d="M 320 130 L 370 130 L 370 380 L 320 380 Z" fill="url(#nova)" />
    <!-- Center Flare Star -->
    <polygon points="256,190 268,220 298,232 268,244 256,274 244,244 214,232 244,220" fill="#ffffff" opacity="0.9" />
  </g>
</svg>
